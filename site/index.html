<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GitHub Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="shell">
    <header class="hero">
      <div class="hero-left">
        <span class="eyebrow">GitHub Analytics</span>
        <h1>Contributor <span class="gradient-text">Leaderboard</span></h1>
        <p id="meta" class="hero-meta">Loading…</p>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </header>

    <section class="card filters-card">
      <div class="filters-row">
        <div class="filter-group">
          <label for="fromMonth">From</label>
          <input type="month" id="fromMonth" />
        </div>
        <div class="filter-group">
          <label for="toMonth">To</label>
          <input type="month" id="toMonth" />
        </div>
        <button id="resetRange" type="button" class="ghost-btn">Reset range</button>
      </div>

      <div class="chips" id="tabs">
        <button data-metric="global_score" class="chip active">
          <span class="chip-icon">★</span> Global
        </button>
        <button data-metric="commits" class="chip">
          <span class="chip-icon">◆</span> Commits
        </button>
        <button data-metric="java_lines" class="chip">
          <span class="chip-icon">J</span> Java
        </button>
        <button data-metric="gaml_lines" class="chip">
          <span class="chip-icon">G</span> GAML
        </button>
        <button data-metric="wiki_lines" class="chip">
          <span class="chip-icon">W</span> Wiki
        </button>
        <button data-metric="issues_opened" class="chip">
          <span class="chip-icon">◯</span> Issues opened
        </button>
        <button data-metric="issues_closed" class="chip">
          <span class="chip-icon">●</span> Issues closed
        </button>
        <button data-metric="prs_opened" class="chip">
          <span class="chip-icon">⇡</span> PRs opened
        </button>
        <button data-metric="prs_merged" class="chip">
          <span class="chip-icon">⤸</span> PRs merged
        </button>
      </div>
    </section>

    <section id="podium" class="podium"></section>

    <section class="card chart-card">
      <div class="card-head">
        <h2>Evolution — top 5</h2>
        <span class="card-sub" id="chartSub">cumulative</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <section class="card board-card">
      <div class="card-head">
        <h2>Full ranking</h2>
        <span class="card-sub" id="boardSub"></span>
      </div>
      <div class="board-wrap">
        <table id="board">
          <thead>
            <tr>
              <th class="col-rank">#</th>
              <th>Contributor</th>
              <th class="col-bar"></th>
              <th class="col-val" id="valueHeader">Score</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer>
      <p>Data from <code>data.json</code> · built via GitHub Actions</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
